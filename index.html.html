<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEXIS CORE | Global Legal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #050810; --card: rgba(10, 15, 28, 0.9); --text: #f1f5f9; --border: rgba(255, 255, 255, 0.05); --accent: #3b82f6; }
        .light-mode { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        .glass-card { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(20px); transition: 0.4s; }
        .input-field { background: transparent; border-bottom: 1px solid var(--border); padding: 10px 4px; color: var(--text); outline: none; width: 100%; transition: 0.3s; }
        .input-field:focus { border-color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .ticker-wrapper { background: var(--accent); color: #ffffff; overflow: hidden; position: fixed; top: 0; width: 100%; z-index: 100; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; font-weight: 900; font-size: 10px; padding: 4px 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="pt-12" onload="initApp()">

    <script>
        // ==========================================================
        // 📍 THE POWER SOURCE: PASTE YOUR KEYS HERE
        // ==========================================================
        const SUPABASE_URL = 'https://knumtycsuwpfjvhborop.supabase.co'; // Click Settings > API in Supabase
        const SUPABASE_KEY = 'sb_publishable_OUJ3LCzEMu7NQTKDrLKEcw_RMFvIW9Y';    // Click Settings > API in Supabase
        // ==========================================================

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const MASTER_SECRET = "LEXIS2026"; 
        let isAdmin = false;
        let posts = [];
        let profile = JSON.parse(localStorage.getItem('lexis_profile')) || { name: 'NODE_GUEST', themeColor: '#3b82f6' };

        async function initApp() {
            setThemeColor(profile.themeColor);
            document.getElementById('userHeader').innerText = profile.name;
            await fetchPosts();
            await fetchChat();
            subscribeToUpdates();
            updateLibrary();
        }

        async function fetchPosts() {
            const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            if (data) { posts = data; renderPosts(); }
        }

        async function addNewPost() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            if(!title || !content) return;
            await sb.from('posts').insert([{ title, content, author: profile.name }]);
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            fetchPosts();
        }

        async function deletePost(id) {
            if(!isAdmin) return;
            if(confirm("Permanently wipe this intel?")) {
                await sb.from('posts').delete().eq('id', id);
                fetchPosts();
            }
        }

        function renderPosts() {
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="glass-card p-8 rounded-[2.5rem] border-l-4 border-accent relative mb-6">
                    <div class="flex justify-between mb-4 text-[9px] font-black uppercase opacity-50">
                        <span>ORIGIN: ${p.author}</span>
                        ${isAdmin ? `<button onclick="deletePost(${p.id})" class="text-red-500 hover:text-red-400">WIPE</button>` : ''}
                    </div>
                    <h2 class="text-xl font-black mb-3">${p.title}</h2>
                    <p class="text-sm opacity-70 leading-relaxed">${p.content}</p>
                </div>
            `).join('');
        }

        async function sendMsg() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            await sb.from('chats').insert([{ user_name: profile.name, message: input.value }]);
            input.value = '';
        }

        async function fetchChat() {
            const { data } = await sb.from('chats').select('*').order('created_at', { ascending: true }).limit(20);
            if(data) renderChatUI(data);
        }

        function renderChatUI(chatData) {
            document.getElementById('chatBox').innerHTML = chatData.map(m => `<div><span class="text-accent font-black">${m.user_name}:</span> ${m.message}</div>`).join('');
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        function subscribeToUpdates() {
            sb.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, fetchPosts)
                             .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chats' }, fetchChat)
                             .subscribe();
        }

        function checkAdmin(val) {
            if(val === MASTER_SECRET) { isAdmin = true; renderPosts(); }
        }

        function setThemeColor(color) {
            document.documentElement.style.setProperty('--accent', color);
            profile.themeColor = color;
            localStorage.setItem('lexis_profile', JSON.stringify(profile));
        }

        function saveProfile() {
            profile.name = document.getElementById('userName').value.toUpperCase() || 'NODE_GUEST';
            localStorage.setItem('lexis_profile', JSON.stringify(profile));
            location.reload();
        }

        function updateLibrary() {
            const vault = { "BD": [{t:"Penal Code", l:"http://bdlaws.minlaw.gov.bd/act-11.html"}], "USA": [{t:"Constitution", l:"https://www.archives.gov/founding-docs/constitution-transcript"}], "UK": [{t:"Magna Carta", l:"https://www.legislation.gov.uk/aep/Edw1cc9/25/9/contents"}] };
            document.getElementById('lawList').innerHTML = vault[document.getElementById('libraryCountry').value].map(law => `<a href="${law.l}" target="_blank" class="block p-2 bg-white/5 rounded-lg text-[9px] font-bold">${law.t}</a>`).join('');
        }

        function searchGlobalLaw() {
            const q = document.getElementById('globalLawQuery').value;
            if(q) window.open(`http://www.worldlii.org/cgi-bin/sinosrch.cgi?query=${encodeURIComponent(q)}`, '_blank');
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
    </script>

    <div class="ticker-wrapper no-print"><div class="ticker-text uppercase tracking-widest">+++ LEXIS CORE ACTIVE +++ PROTOCOL SECURE +++ DATABASE READY +++</div></div>

    <nav class="fixed w-full z-50 top-6 border-b border-white/5 px-6 py-4" style="background: var(--bg);">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-accent text-white w-8 h-8 rounded-lg flex items-center justify-center font-black">L</div>
                <span class="text-white font-black text-sm tracking-tighter">LEXIS CORE</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="text-slate-400"><i class="fa-solid fa-circle-half-stroke"></i></button>
                <button onclick="document.getElementById('profileModal').classList.remove('hidden')" class="flex items-center gap-2 bg-white/5 border border-white/10 px-3 py-1 rounded-full text-[10px] text-accent">
                    <span id="userHeader">GUEST</span> <i class="fa-solid fa-shield-halved"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 grid lg:grid-cols-12 gap-6 pt-24 pb-20">
        <div class="lg:col-span-3 space-y-6">
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-[10px] font-black text-accent uppercase mb-4 tracking-widest">Search Law</h3>
                <input type="text" id="globalLawQuery" placeholder="Keyword..." class="input-field text-[10px] mb-3">
                <button onclick="searchGlobalLaw()" class="w-full bg-accent text-white font-black py-2 rounded-xl text-[9px]">EXECUTE</button>
            </div>
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-[10px] font-black text-accent uppercase mb-4">Archives</h3>
                <select id="libraryCountry" onchange="updateLibrary()" class="w-full bg-slate-900 border border-white/10 rounded-xl p-2 text-[10px] text-accent mb-4">
                    <option value="BD">Bangladesh</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                </select>
                <div id="lawList" class="space-y-2"></div>
            </div>
        </div>

        <div class="lg:col-span-6"><div id="feed"></div></div>

        <div class="lg:col-span-3 space-y-6">
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-xs font-black mb-4 uppercase text-accent">New Post</h3>
                <input type="text" id="postTitle" placeholder="Title" class="input-field text-[10px] mb-3">
                <textarea id="postContent" rows="3" placeholder="Logic..." class="input-field text-[10px] mb-3"></textarea>
                <button onclick="addNewPost()" class="w-full bg-accent text-white font-black py-3 rounded-xl text-[10px]">SYNC</button>
            </div>
            <div class="glass-card p-6 rounded-[2rem] h-[250px] flex flex-col">
                <h3 class="text-xs font-black mb-4 uppercase text-accent">Live Chat</h3>
                <div id="chatBox" class="flex-1 overflow-y-auto space-y-2 mb-3 text-[9px] custom-scrollbar"></div>
                <div class="flex gap-2">
                    <input type="text" id="chatInput" placeholder="Enter message..." class="bg-slate-900 border border-white/5 rounded-lg px-2 py-1 text-[9px] flex-1 outline-none">
                    <button onclick="sendMsg()" class="bg-accent text-white px-2 py-1 rounded-lg text-[9px] font-black">SEND</button>
                </div>
            </div>
        </div>
    </main>

    <div id="profileModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-4">
        <div class="glass-card p-10 rounded-[3rem] max-w-sm w-full">
            <h2 class="text-xl font-black mb-6 text-white uppercase">Profile Set</h2>
            <input type="text" id="userName" placeholder="Your Name" class="input-field mb-4">
            <button onclick="saveProfile()" class="w-full bg-white text-slate-950 font-black py-4 rounded-2xl mb-4">SAVE</button>
            <p class="text-[8px] text-slate-600 uppercase mb-2">Admin Key</p>
            <input type="password" placeholder="Key" onkeyup="checkAdmin(this.value)" class="input-field">
        </div>
    </div>
</body>
</html>
